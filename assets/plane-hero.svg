<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">SimPlane dashboard</title>
  <desc id="desc">Terminal-style aircraft dashboard with a clear plane silhouette and sensor readings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020305"/>
      <stop offset="100%" stop-color="#07121d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="100%" stop-color="#040a10"/>
    </linearGradient>
    <linearGradient id="planeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff9ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7de4ff" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcf7a"/>
      <stop offset="100%" stop-color="#ff8559"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="460" rx="22" fill="url(#bg)"/>
  <rect x="14" y="14" width="1172" height="432" rx="18" fill="url(#panel)" stroke="#27445d" stroke-width="1.4"/>

  <g opacity="0.12" stroke="#7bbad0" stroke-width="1">
    <path d="M42 76H1158"/>
    <path d="M42 132H1158"/>
    <path d="M42 188H1158"/>
    <path d="M42 244H1158"/>
    <path d="M42 300H1158"/>
    <path d="M42 356H1158"/>
    <path d="M700 38V408"/>
    <path d="M42 38V408"/>
    <path d="M1158 38V408"/>
  </g>

  <rect x="34" y="34" width="1132" height="34" rx="17" fill="#07101a" stroke="#214158" stroke-width="1.2" opacity="0.98"/>
  <text x="600" y="56" text-anchor="middle" fill="#e9f7ff" font-family="Consolas, 'Courier New', monospace" font-size="19" font-weight="700" letter-spacing="1.2">
    ProjetS6-STM32-SimPlane
  </text>

  <line x1="700" y1="84" x2="700" y2="396" stroke="#35546d" stroke-width="1.4" opacity="0.9"/>

  <g font-family="Consolas, 'Courier New', monospace" fill="#edf7ff" letter-spacing="0.4">
    <text x="312" y="112" text-anchor="middle" font-size="20" font-weight="700">VISUALISATION AVION</text>
    <text x="856" y="112" text-anchor="middle" font-size="20" font-weight="700">CAPTEURS &amp; ETATS</text>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" fill="#9fd0df" font-size="18" font-weight="600">
    <text x="307" y="148" text-anchor="middle">CIEL</text>
    <text x="307" y="168" text-anchor="middle">^</text>
  </g>

  <g transform="translate(0 0)" filter="url(#shadow)">
    <path d="M332 88
             L348 110
             L348 170
             L406 188
             L528 218
             L406 248
             L348 266
             L348 326
             L332 348
             L316 326
             L316 266
             L258 248
             L136 218
             L258 188
             L316 170
             L316 110
             Z"
          fill="url(#planeFill)" stroke="#eaf8ff" stroke-width="2.3" stroke-linejoin="round"/>

    <path d="M332 96 L332 334" stroke="#d9f2ff" stroke-width="4.4" stroke-linecap="round" opacity="0.92"/>
    <ellipse cx="332" cy="128" rx="15" ry="20" fill="#08131f" stroke="#eaf8ff" stroke-width="1.5" opacity="0.95"/>

    <path d="M220 218 L444 218" stroke="#d9f2ff" stroke-width="5.2" stroke-linecap="round" opacity="0.58"/>
    <path d="M286 300 L378 300" stroke="#d9f2ff" stroke-width="4.5" stroke-linecap="round" opacity="0.58"/>
    <circle cx="230" cy="218" r="11" fill="#08131f" stroke="#eaf8ff" stroke-width="1.4" opacity="0.96"/>
    <circle cx="434" cy="218" r="11" fill="#08131f" stroke="#eaf8ff" stroke-width="1.4" opacity="0.96"/>

    <path d="M320 348 L332 380 L344 348" fill="none" stroke="#eaf8ff" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M325 348 L325 380" stroke="#eaf8ff" stroke-width="2.1"/>
    <path d="M339 348 L339 380" stroke="#eaf8ff" stroke-width="2.1"/>
    <path d="M308 218 L356 218" stroke="#ffcf7a" stroke-width="2" opacity="0.85"/>
    <path d="M322 300 L342 300" stroke="#ffcf7a" stroke-width="2" opacity="0.85"/>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" fill="#9fd0df" font-size="18" font-weight="600">
    <text x="307" y="392" text-anchor="middle">v</text>
    <text x="307" y="414" text-anchor="middle">SOL</text>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" fill="#eaf5fb" font-size="15.5">
    <text x="724" y="150">TEMP     :  30 C      PRESSION : 1007.1 hPa</text>
    <text x="724" y="174">HUMIDITE :  53 %      MAGNETIQUE:   14 uT</text>
    <text x="724" y="198">ALTITUDE :  48 m      ALT REF   :   48 m</text>
    <text x="724" y="222">ALT REL  :  +0 m      ACC X     : +0.00 g</text>
    <text x="724" y="246">ACC Y    :  +0.00 g   ACC Z     : +1.01 g</text>
    <text x="724" y="270">ROULIS   :  +00 deg   TANGAGE   : +00 deg</text>
    <text x="724" y="294">LACET Z  :  -01.4 dps MOTEUR    : OFF</text>
    <text x="724" y="318">GAZ      :  0 %       RICHESSE   : 0 %</text>
    <text x="724" y="342">RESERVOIR:  94 %      TRAIN      : HAUT</text>
    <text x="724" y="366">VOLETS   :  UP        SYSTEME    : OK</text>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" fill="#9fd0df" font-size="15">
    <text x="724" y="392">GAZ         :   [----------]</text>
    <text x="724" y="418">RICHESSE    :   [----------]</text>
    <text x="900" y="392">RESERVOIR   :   [#########-]</text>
    <text x="900" y="418">VOLETS      :   [----------]</text>
  </g>

  <text x="724" y="448" fill="#eaf5fb" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="700">
    ALARME : aucun evenement critique
  </text>
</svg>
